version: "3.9"

services:
  # ── Redis (Message Broker) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: devdocsai_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devdocsai_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REPO_CLONE_DIR=/tmp/devdocsai_repos
      - CHROMA_PERSIST_DIR=/app/chroma_data
    volumes:
      - chroma_data:/app/chroma_data
      - repo_temp:/tmp/devdocsai_repos
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Celery Worker (Analysis Pipeline) ────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devdocsai_worker
    command: >
      celery -A app.workers.celery_app.celery_app worker
      --loglevel=info
      --queues=analysis
      --concurrency=2
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REPO_CLONE_DIR=/tmp/devdocsai_repos
      - CHROMA_PERSIST_DIR=/app/chroma_data
    volumes:
      - chroma_data:/app/chroma_data
      - repo_temp:/tmp/devdocsai_repos
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  chroma_data:
  repo_temp:
